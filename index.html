<!DOCTYPE html>
<html>
<head>
  <title>WGT AgamTime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Login -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .button {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: #28a745;
      color: white;
      cursor: pointer;
    }

    .button:disabled {
      background: grey;
      cursor: not-allowed;
    }

    .status {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>AgamTime</h2>

<!-- Login -->
<div id="loginDiv"></div>

<!-- User -->
<div class="card">
  <p id="user">Not logged in</p>
</div>

<!-- Location -->
<div class="card">
  <p id="location">Location: Not detected</p>
  <p id="status" class="status"></p>
</div>

<!-- Button -->
<div class="card">
  <button id="logBtn" class="button" disabled>Loading...</button>
</div>

<!-- Logs -->
<div class="card">
  <h3>Last Logs</h3>
  <div id="logs">No data yet</div>
</div>

<script>
  let userName = "";
  let userEmail = "";
  let userLat = null;
  let userLng = null;

  // ======================
  // GOOGLE LOGIN
  // ======================
  function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);

    userName = data.name;
    userEmail = data.email;

    document.getElementById("user").innerText =
      "Logged in as: " + userName + " (" + userEmail + ")";

    document.getElementById("loginDiv").style.display = "none";

    onUserLoggedIn();
  }

  function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(
      atob(base64)
        .split('')
        .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
        .join('')
    );

    return JSON.parse(jsonPayload);
  }

  // ======================
  // AFTER LOGIN
  // ======================
  function onUserLoggedIn() {
    getLocation();
  }

  // ======================
  // GPS LOCATION
  // ======================
  function getLocation() {
    if (!navigator.geolocation) {
      document.getElementById("location").innerText = "GPS not supported";
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        userLat = position.coords.latitude;
        userLng = position.coords.longitude;

        document.getElementById("location").innerText =
          "Lat: " + userLat + ", Lng: " + userLng;

        document.getElementById("status").innerText =
          "Location captured";

        // Enable button now
        const btn = document.getElementById("logBtn");
        btn.disabled = false;
        btn.innerText = "CHECK IN";

      },
      (error) => {
        document.getElementById("location").innerText =
          "Location error: " + error.message;
      }
    );
  }

  // ======================
  // INIT
  // ======================
  window.onload = function () {
    google.accounts.id.initialize({
      client_id: "634394989255-nobqqpqf608oakjeoo8f3pkrfftebsh9.apps.googleusercontent.com",
      callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
      document.getElementById("loginDiv"),
      { theme: "outline", size: "large" }
    );
  };
</script>

</body>
</html>
