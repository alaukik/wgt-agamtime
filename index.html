<!DOCTYPE html>
<html>
<head>
  <title>WGT AgamTime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .button {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: #28a745;
      color: white;
      cursor: pointer;
    }

    .button:disabled {
      background: grey;
    }

    .center {
      text-align: center;
      margin-top: 50px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h2>AgamTime</h2>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="center">
  <div id="loginDiv"></div>
</div>

<!-- MAIN APP -->
<div id="appScreen" class="hidden">

  <!-- User -->
  <div class="card">
    <p id="user"></p>
  </div>

  <!-- Location -->
  <div class="card">
    <p id="location">Detecting location...</p>
    <p id="status"></p>
  </div>

  <!-- Button -->
  <div class="card">
    <button id="logBtn" class="button" disabled>Loading...</button>
  </div>

  <!-- Logs -->
  <div class="card">
    <h3>Last Logs</h3>
    <div id="logs">No data yet</div>
  </div>

</div>

<script>
  let userName = "";
  let userEmail = "";
  let userLat = null;
  let userLng = null;

  // ======================
  // LOGIN HANDLER
  // ======================
  function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);

    userName = data.name;
    userEmail = data.email;

    // Switch UI
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("appScreen").classList.remove("hidden");

    document.getElementById("user").innerText =
      "👤 " + userName + "\n✉️ " + userEmail;

    onUserLoggedIn();
  }

  function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(
      atob(base64)
        .split('')
        .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
        .join('')
    );

    return JSON.parse(jsonPayload);
  }

  // ======================
  // AFTER LOGIN
  // ======================
  function onUserLoggedIn() {
    getLocation();
  }

  // ======================
  // GPS
  // ======================
  function getLocation() {
    if (!navigator.geolocation) {
      document.getElementById("location").innerText = "GPS not supported";
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        userLat = position.coords.latitude;
        userLng = position.coords.longitude;

        document.getElementById("location").innerText =
          "📍 Lat: " + userLat + ", Lng: " + userLng;

        document.getElementById("status").innerText =
          "Location captured";

        const btn = document.getElementById("logBtn");
        btn.disabled = false;
        btn.innerText = "CHECK IN";
      },
      (error) => {
        document.getElementById("location").innerText =
          "Location error: " + error.message;
      }
    );
  }

  // ======================
  // INIT
  // ======================
  window.onload = function () {
    google.accounts.id.initialize({
      client_id: "634394989255-nobqqpqf608oakjeoo8f3pkrfftebsh9.apps.googleusercontent.com",
      callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
      document.getElementById("loginDiv"),
      { theme: "outline", size: "large" }
    );
  };
</script>

</body>
</html>
