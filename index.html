<!DOCTYPE html>
<html>
<head>
  <title>WGT AgamTime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .button {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
      background: #28a745;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>AgamTime</h2>

<div id="loginDiv"></div>

<div class="card">
  <p id="user">Not logged in</p>
</div>

<div class="card">
  <p id="location">Location: Not detected</p>
</div>

<div class="card">
  <button class="button">CHECK IN</button>
</div>

<div class="card">
  <h3>Last Logs</h3>
  <div id="logs">No data yet</div>
</div>

<script>
  let userName = "";
  let userEmail = "";

  function handleCredentialResponse(response) {
    const data = parseJwt(response.credential);

    userName = data.name;
    userEmail = data.email;

    document.getElementById("user").innerText =
      "Logged in as: " + userName + " (" + userEmail + ")";
  }

  function parseJwt(token) {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(
      atob(base64)
        .split('')
        .map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2))
        .join('')
    );

    return JSON.parse(jsonPayload);
  }

  window.onload = function () {
    google.accounts.id.initialize({
      client_id: "634394989255-nobqqpqf608oakjeoo8f3pkrfftebsh9.apps.googleusercontent.com",
      callback: handleCredentialResponse
    });

    google.accounts.id.renderButton(
      document.getElementById("loginDiv"),
      { theme: "outline", size: "large" }
    );
  };
</script>

</body>
</html>
